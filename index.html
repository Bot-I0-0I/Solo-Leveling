<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Life Control System</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
    <script>
      const originalError = console.error;
      console.error = function(...args) {
        if (args[0] && typeof args[0] === 'string' && (args[0].includes('[vite] failed to connect to websocket') || args[0].includes('WebSocket closed without opened'))) {
          return;
        }
        if (args[1] && args[1].message && args[1].message.includes('WebSocket')) {
          return;
        }
        originalError.apply(console, args);
      };
      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        if (reason) {
          const msg = typeof reason === 'string' ? reason : (reason.message || '');
          if (msg.includes('WebSocket')) {
            event.preventDefault();
          }
        }
      });
      window.addEventListener('error', function(event) {
        if (event.message && event.message.includes('WebSocket')) {
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
